services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    # No host port bind — Coolify Traefik/Caddy proxies to container port 8080.
    # For local use: temporarily add ports: ["8080:8080"] under this service.
    expose:
      - "8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      # Required: set a long random string in Coolify / .env
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      # External Ollama (e.g. Cortex at 10.0.0.1)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://10.0.0.1:11434}
      # Optional: OpenAI-compatible APIs (OpenAI, Groq, LiteLLM, etc.)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-}
      # First account created becomes admin
      - WEBUI_AUTH=${WEBUI_AUTH:-True}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-True}

volumes:
  open-webui-data:
